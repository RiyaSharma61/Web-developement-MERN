<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon-Game</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <h1>Simon Says Game</h1>
    <h3>Press any key to start the Game</h3>

    <div class="btn-container">
        <div class="line line-1">
            <div class="red btn" type="button" id="red">1</div>
            <div class="yellow btn" type="button" id="yellow">2</div>
        </div>
        <div class=" line line-2">
            <div class="blue btn" type="button" id="blue">3</div>
            <div class="green btn" type="button" id="green">4</div>
        </div>
            
    </div>


    <script src="game.js"></script>
</body>
</html>
