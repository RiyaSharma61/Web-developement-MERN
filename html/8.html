<!--table making by table, caption, tr, th, td tags-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table making in HTML</title>
</head>
<body>
    <table border="black">
        <!-- border making in html for better look -->
        <caption>Table for Colde Drinks</caption>
        <thead>
            <tr>
                <th>NAME</th>
                <th>BRAND</th>
                <th>PRICE</th>
            </tr>
        </thead>
        
        <tbody>
            <tr>
                <td>ThumsUp</td>
                <td>COKE</td>
                <td>40</td>
            </tr>
            <tr>
                <td>Coco cola</td>
                <td>COKE</td>
                <td>45</td>
            </tr>
            <tr>
                <td>Limca</td>
                <td>PEPSI</td>
                <td>50</td>
            </tr>
        </tbody>
        
    </table>
</body>
</html>
